<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
  <defs>
    <pattern id="scanline" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="white" fill-opacity="0.1" />
      <rect y="1" width="4" height="3" fill="black" fill-opacity="0.1" />
    </pattern>
    <linearGradient id="scanbar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0" />
      <stop offset="50%" stop-color="white" stop-opacity="0.05" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#scanline)" />
  <rect width="100%" height="20%" fill="url(#scanbar)">
    <animate attributeName="y" values="-20%;120%" dur="6s" repeatCount="indefinite" />
  </rect>
</svg>
